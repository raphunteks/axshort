<!-- FILE: views/explore.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <%- include('./partials/header.html') %>
    <link rel="stylesheet" href="/public/css/main.css">
</head>
<body>
    <div class="blob-bg"></div>
    
    <header style="padding: 20px; text-align: center;">
        <h2>Jelajahi Kategori</h2>
    </header>

    <main style="padding: 20px;">
        <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
            <span class="clay-badge genre-filter">Fiksi Ilmiah</span>
            <span class="clay-badge genre-filter">Romantis</span>
            <span class="clay-badge genre-filter">Aksi</span>
            <span class="clay-badge genre-filter">Horror</span>
            <span class="clay-badge genre-filter">Komedi</span>
        </div>
        
        <div class="glass-panel" style="margin-top: 30px; padding: 20px;">
            <h3 style="color: var(--accent-cyan); text-align: center; margin-bottom: 20px;">Katalog Lengkap</h3>
            
            <!-- [SUPER UPGRADE] WADAH GRID VIDEO EXPLORE -->
            <div id="explore-video-grid" class="video-grid" style="padding: 0;">
                <p style="text-align:center; width:100%; color:var(--accent-cyan);">⏳ Menarik data server...</p>
            </div>
        </div>
    </main>

    <%- include('./partials/footer.html') %>
    <script src="/public/js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const navItems = document.querySelectorAll('.nav-item');
            if (navItems && navItems.length > 1) {
                navItems.forEach(el => el.classList.remove('active'));
                navItems[1].classList.add('active');
            }
        });
    </script>
</body>
</html>
