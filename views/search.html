<!-- FILE: views/search.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <%- include('./partials/header.html') %>
    <link rel="stylesheet" href="/public/css/main.css">
</head>
<body>
    <div class="blob-bg"></div>
    
    <main style="padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 80vh;">
        <h2 style="margin-top: 20px; margin-bottom: 20px;">Cari Film Favorit Lo</h2>
        
        <!-- [SUPER UPGRADE] ID searchInput DITAMBAHKAN AGAR JS BISA BACA KETIKAN -->
        <input type="text" id="searchInput" class="neu-glass-input" placeholder="Ketik judul film atau genre..." style="width: 100%; max-width: 400px; margin-bottom: 30px;">
        
        <!-- [SUPER UPGRADE] WADAH GRID HASIL PENCARIAN -->
        <div id="search-video-grid" class="video-grid" style="width: 100%; padding: 0;">
            <!-- Hasil pencarian live akan muncul di sini -->
        </div>
    </main>

    <%- include('./partials/footer.html') %>
    <script src="/public/js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const navItems = document.querySelectorAll('.nav-item');
            if (navItems && navItems.length > 2) {
                navItems.forEach(el => el.classList.remove('active'));
                navItems[2].classList.add('active');
            }
        });
    </script>
</body>
</html>
