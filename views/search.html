<!-- FILE: views/search.html -->
<!DOCTYPE html>
<html lang="id">
<!-- [SUPER UPGRADE] Vercel Path Fix -->
<%- include('./partials/header.html') %>
<body>
    <div class="blob-bg"></div>
    
    <main style="padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 80vh; justify-content: center;">
        <h2 style="margin-bottom: 20px;">Cari Film Favorit Lo</h2>
        
        <input type="text" class="neu-glass-input" placeholder="Ketik judul film..." style="width: 100%; max-width: 400px; margin-bottom: 20px;">
        
        <button class="btn-skeuo" style="width: 100%; max-width: 400px;">Cari Sekarang</button>
    </main>

    <!-- [SUPER UPGRADE] Vercel Path Fix -->
    <%- include('./partials/footer.html') %>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const navItems = document.querySelectorAll('.nav-item');
            if (navItems && navItems.length > 2) {
                navItems.forEach(el => el.classList.remove('active'));
                navItems[2].classList.add('active');
            }
        });
    </script>
</body>
</html>
